<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 28" width="28" height="28">
  <!-- Background Card (w-7 h-7 bg-blue-600 rounded-lg) -->
  <rect width="28" height="28" rx="6" fill="#2563eb" />
  
  <!-- Grouped bars centered on the canvas (flex items-center justify-center) -->
  <g fill="#ffffff">
    <!-- Left Bar (w-0.5 h-2.5 rounded-full mx-0.5) -->
    <rect x="7" y="9" width="2" height="10" rx="1" />
    
    <!-- Middle Bar (w-0.5 h-4 rounded-full mx-0.5) -->
    <rect x="13" y="6" width="2" height="16" rx="1" />
    
    <!-- Right Bar (w-0.5 h-1.5 rounded-full mx-0.5) -->
    <rect x="19" y="11" width="2" height="6" rx="1" />
  </g>
</svg>
